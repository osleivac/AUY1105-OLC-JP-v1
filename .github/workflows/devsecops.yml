name: DevSecOps Pipeline – AUY1105


on:
  pull_request:
    branches:
      - main          # Solo se activa en PR hacia main (requerido por rubrica)


jobs:
  analisis-estatico:
    name: '1. Analisis Estatico (TFLint)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4


      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'


      - name: Instalar TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3


      - name: Inicializar TFLint
        run: tflint --init


      - name: Ejecutar TFLint
        run: tflint --recursive


  analisis-seguridad:
    name: '2. Analisis de Seguridad (Checkov)'
    runs-on: ubuntu-latest
    needs: analisis-estatico    # Secuencial: espera al job anterior
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4


      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true    # (aqui es false: Falla el pipeline si hay vulnerabilidades criticas) 
                             # Los 7 fallos restantes no se corrigen porque requieren recursos avanzados
                             # (como Roles de IAM y Flow Logs) restringidos en los AWS Learner Labs, 
                             #o funciones como EBS Optimized que son incompatibles con la capa gratuita t2.micro. 
                             # Intentar aplicarlos bloquearía la creación de tu infraestructura debido a permisos 
                             # insuficientes o errores de compatibilidad de hardware en el entorno de estudiante.




  validacion-terraform:
    name: '3. Validacion Terraform'
    runs-on: ubuntu-latest
    needs: analisis-seguridad   # Secuencial: espera al job anterior
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4


      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'


      - name: Terraform Init
        run: terraform init -backend=false


      - name: Terraform Validate
        run: terraform validate
