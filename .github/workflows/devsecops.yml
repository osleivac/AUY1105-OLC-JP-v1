name: DevSecOps Pipeline – AUY1105

# ─────────────────────────────────────────────────────────────
# GATILLADOR: Solo en Pull Request hacia main (requerido por rubrica)
# ─────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - main

# Permisos mínimos para el runner
permissions:
  contents: read
  pull-requests: write   # Para comentar resultados en el PR

# ─────────────────────────────────────────────────────────────
# SECRETS REQUERIDOS EN GITHUB (Settings → Secrets → Actions):
#
#   AWS_ACCESS_KEY_ID      → credencial AWS Academy
#   AWS_SECRET_ACCESS_KEY  → credencial AWS Academy
#   AWS_SESSION_TOKEN      → credencial AWS Academy (Labs usan token temporal)
#   TF_VAR_public_key      → contenido de tu clave publica SSH (cat ~/.ssh/id_rsa.pub)
#   EC2_SSH_PRIVATE_KEY    → contenido de tu clave privada SSH (cat ~/.ssh/id_rsa)
#
# Para generarlas en tu maquina local:
#   ssh-keygen -t rsa -b 4096 -f ~/.ssh/auy1105_key
#   TF_VAR_public_key  = cat ~/.ssh/auy1105_key.pub
#   EC2_SSH_PRIVATE_KEY = cat ~/.ssh/auy1105_key
# ─────────────────────────────────────────────────────────────

env:
  TF_VERSION: "1.7.0"
  AWS_REGION:  "us-east-1"

jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1: ANÁLISIS ESTÁTICO CON TFLINT
  # Criterio: IL 6.1.2 – Análisis de calidad del código IaC
  # ═══════════════════════════════════════════════════════════
  analisis-estatico:
    name: "1. Analisis Estatico (TFLint)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Instalar TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Inicializar TFLint (descarga plugins)
        run: tflint --init

      - name: Ejecutar TFLint
        # soft_fail=false: cualquier error de TFLint bloquea el pipeline (IL 6.2.2)
        run: tflint --recursive

  # ═══════════════════════════════════════════════════════════
  # JOB 2: ANÁLISIS DE SEGURIDAD CON CHECKOV
  # Criterio: IL 6.1.2 / IL 6.2.1 – Seguridad estática IaC
  # ═══════════════════════════════════════════════════════════
  analisis-seguridad:
    name: "2. Analisis de Seguridad (Checkov)"
    runs-on: ubuntu-latest
    needs: analisis-estatico    # Secuencial: espera Job 1

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          # soft_fail: true → justificado porque varios checks de Checkov requieren
          # recursos avanzados (IAM Roles, VPC Flow Logs, EBS Optimized) que no
          # estan disponibles en AWS Academy Learner Labs o son incompatibles con
          # t2.micro (Free Tier). El pipeline reporta pero no bloquea por estos.
          # Los checks criticos (cifrado, IMDSv2) SI estan corregidos en el codigo.
          soft_fail: true
          output_format: cli

  # ═══════════════════════════════════════════════════════════
  # JOB 3: VALIDACIÓN SINTÁCTICA DE TERRAFORM
  # Criterio: IL 6.1.2 – Validación de configuración IaC
  # ═══════════════════════════════════════════════════════════
  validacion-terraform:
    name: "3. Validacion Terraform (terraform validate)"
    runs-on: ubuntu-latest
    needs: analisis-seguridad   # Secuencial: espera Job 2

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (sin backend remoto)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ═══════════════════════════════════════════════════════════
  # JOB 4: DESPLIEGUE EN AWS (terraform apply)
  # Criterio: IL 6.2.2 – Sistema automatizado de permisos y despliegue
  #
  # SECRETS usados:
  #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN
  #   TF_VAR_public_key
  # ═══════════════════════════════════════════════════════════
  despliegue-aws:
    name: "4. Despliegue AWS (terraform apply)"
    runs-on: ubuntu-latest
    needs: validacion-terraform  # Solo despliega si los 3 jobs anteriores pasan

    # Configura las credenciales AWS como variables de entorno del runner.
    # Terraform las detecta automaticamente sin necesidad de configurarlas en provider.tf.
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      # TF_VAR_public_key inyecta la variable "public_key" de variables.tf
      TF_VAR_public_key:     ${{ secrets.TF_VAR_public_key }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan.binary

      # Guardar el plan JSON para OPA (Job 5)
      - name: Exportar plan a JSON para OPA
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Subir plan JSON como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-json
          path: tfplan.json
          retention-days: 1

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan.binary

      # Captura la IP publica generada para usarla en el Job de SSH
      - name: Obtener IP publica de la EC2
        id: get-ip
        run: |
          EC2_IP=$(terraform output -raw public_ip)
          echo "EC2_IP=$EC2_IP" >> $GITHUB_OUTPUT
          echo "IP de la EC2: $EC2_IP"

    # Expone EC2_IP como output del job para el Job 6
    outputs:
      ec2_ip: ${{ steps.get-ip.outputs.EC2_IP }}

  # ═══════════════════════════════════════════════════════════
  # JOB 5: VALIDACIÓN DE POLÍTICAS OPA
  # Criterio: IL 6.2.1 / IL 6.2.2 / IL 6.2.3
  # ═══════════════════════════════════════════════════════════
  validacion-opa:
    name: "5. Validacion Politicas OPA"
    runs-on: ubuntu-latest
    needs: despliegue-aws

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar OPA
        run: |
          curl -sSL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static \
            -o /usr/local/bin/opa
          chmod +x /usr/local/bin/opa
          opa version

      - name: Descargar plan JSON (artefacto del Job anterior)
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json

      - name: Evaluar Politica 1 – Bloquear SSH publico (0.0.0.0/0)
        run: |
          echo "=== Politica: no_ssh_public ==="
          RESULT=$(opa eval -i tfplan.json \
            -d policies/no_ssh_public.rego \
            "data.terraform.authz.allow" \
            --format raw)
          echo "Resultado allow: $RESULT"
          # Mostrar violaciones si las hay
          opa eval -i tfplan.json \
            -d policies/no_ssh_public.rego \
            "data.terraform.authz.violation" \
            --format pretty || true

      - name: Evaluar Politica 2 – Solo instancias t2.micro
        run: |
          echo "=== Politica: only_t2_micro ==="
          RESULT=$(opa eval -i tfplan.json \
            -d policies/only_t2_micro.rego \
            "data.terraform.authz.allow_instance_type" \
            --format raw)
          echo "Resultado allow_instance_type: $RESULT"
          opa eval -i tfplan.json \
            -d policies/only_t2_micro.rego \
            "data.terraform.authz.violation" \
            --format pretty || true

  # ═══════════════════════════════════════════════════════════
  # JOB 6: VERIFICACIÓN SSH A LA EC2
  # Confirma que la instancia esta activa y user_data completo
  # Criterio: evidencia de despliegue funcional
  # ═══════════════════════════════════════════════════════════
  verificacion-ssh:
    name: "6. Verificacion SSH a EC2"
    runs-on: ubuntu-latest
    needs: despliegue-aws

    env:
      EC2_IP: ${{ needs.despliegue-aws.outputs.ec2_ip }}

    steps:
      - name: Configurar clave SSH privada
        run: |
          mkdir -p ~/.ssh
          # EC2_SSH_PRIVATE_KEY contiene el contenido completo de la clave privada
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/auy1105_key
          chmod 600 ~/.ssh/auy1105_key
          # Deshabilitar strict host checking para IPs nuevas (runner no conoce el host)
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null"  >> ~/.ssh/config

      - name: Esperar a que la EC2 este lista (user_data puede tardar ~2 min)
        run: |
          echo "Esperando 120 segundos para que user_data termine..."
          sleep 120

      - name: Verificar conexion SSH y estado de herramientas
        run: |
          ssh -i ~/.ssh/auy1105_key \
              -o ConnectTimeout=30 \
              ubuntu@${{ env.EC2_IP }} << 'ENDSSH'
            echo "=== Conexion SSH exitosa ==="
            echo "Hostname: $(hostname)"
            echo "Usuario: $(whoami)"
            echo ""
            echo "=== Verificacion de herramientas instaladas por user_data ==="
            terraform   version  | head -1  && echo "✓ Terraform OK"   || echo "✗ Terraform FALLO"
            tflint      --version            && echo "✓ TFLint OK"      || echo "✗ TFLint FALLO"
            checkov     --version | head -1  && echo "✓ Checkov OK"     || echo "✗ Checkov FALLO"
            terraform-docs --version         && echo "✓ TFDocs OK"      || echo "✗ TFDocs FALLO"
            opa         version  | head -1   && echo "✓ OPA OK"         || echo "✗ OPA FALLO"
            echo ""
            echo "=== Log de aprovisionamiento (ultimas 20 lineas) ==="
            sudo tail -20 /var/log/install.log || echo "(log no disponible aun)"
          ENDSSH

      - name: Limpiar clave SSH del runner
        if: always()  # Se ejecuta aunque el paso anterior falle
        run: rm -f ~/.ssh/auy1105_key
